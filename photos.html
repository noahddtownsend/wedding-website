<div id="photosPage">
    <div id="detailsImageBackground"></div>
    <div id="photosContent">
        <h1 class="centerHeader">Photo Gallery</h1>
        <p class="gallerySubtitle">A collection of our favorite moments together. Enjoy the music while you browse!</p>

        <!-- Loading spinner -->
        <div id="galleryLoading">
            <div class="spinner"></div>
            <p>Gathering memories...</p>
        </div>

        <!-- Grid/Masonry layout for photos -->

    </div>

<!-- Fullscreen Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="lightboxClose">&times;</span>
    <span class="lightboxArrow lightboxPrev">&#10094;</span>
    <span class="lightboxArrow lightboxNext">&#10095;</span>
    <div class="lightboxContent">
        <img id="lightboxImg" src="" alt="Zoomed view">
        <video id="lightboxVideo" controls style="display: none;"></video>
    </div>
    <div class="lightbox-toolbar">
        <button id="slideshowPlayPause" class="toolbar-btn" title="Play/Pause Slideshow">
            <svg class="icon-slideshow-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-slideshow-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="slideshowShuffle" class="toolbar-btn" title="Shuffle Mode">
            <svg class="icon-shuffle" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 18 7.41 20.04 9.45 21 4h-6.5zm.09 10.83l-1.42 1.42 3.83 3.83L15 22.04 20.5 22l-.04-5.5-2.04 2.04-3.83-3.83z"/></svg>
        </button>
        <span id="lightboxIndex" class="lightbox-index">0 / 0</span>
    </div>
</div>

<!-- Floating Custom Audio Player -->
<div id="audioPlayerWidget" class="audio-player minimized">
    <!-- Pulse Trigger (Collapsed State) -->
    <div class="player-trigger" id="playerTrigger">
        <div class="pulse-ring"></div>
        <svg class="music-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <span class="trigger-text">Play Music</span>
    </div>

    <!-- Player Controls (Expanded State) -->
    <div class="player-expanded-content">
        <button id="playPauseBtn" class="control-btn play">
            <!-- Play SVG icon -->
            <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <!-- Pause SVG icon -->
            <svg class="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="track-info">
            <div class="track-name">Ely Lights</div>
            <div class="track-artist">The Pink Dream</div>
        </div>

        <div class="scrubber-container">
            <span class="time-current" id="timeCurrent">0:00</span>
            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time-duration" id="timeDuration">0:00</span>
        </div>

        <div class="volume-container">
            <button id="volumeBtn" class="control-btn">
                <!-- Volume Up Icon -->
                <svg class="icon-volume" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <!-- Muted Icon (Hidden initially) -->
                <svg class="icon-mute" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
        </div>

        <div class="visualizer" id="audioVisualizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <button id="minimizeBtn" class="control-btn minimize" title="Minimize player">
            <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
    </div>
