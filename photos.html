<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HQVX2CJVEF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'G-HQVX2CJVEF');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="robots" content="noimageindex, noai, noimageai"/>
    <title>Genevieve & Noah - Photos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap&family=Cactus+Classical+Serif&family=Open+Sans:ital@0;1&display=swap"
          rel="stylesheet">
    
    <link href="main.css" rel="stylesheet">
    <link href="photos.css?v=23" rel="stylesheet">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="photos_data.js?v=23"></script>
    <script src="photos.js?v=23"></script>

    <link rel="icon" type="image/x-icon" href="/images/assets/g&nlogo.png">
</head>
<body>

<div id="photosPage">
    <div id="detailsImageBackground"></div>
    <div id="photosContent">
        <!-- New Slideshow Container -->
        <div id="slideshowContainer" class="slideshow-container">
            <div id="slideActive" class="slide active"></div>
            <div id="slideIncoming" class="slide"></div>
            
            <!-- Slideshow Controls Overlay -->
            <span class="slideshow-arrow arrow-prev" id="prevBtn">&#10094;</span>
            <span class="slideshow-arrow arrow-next" id="nextBtn">&#10095;</span>
            
            <div class="slideshow-info">
                <span id="slideshowIndex" class="slideshow-index">1 / 1</span>
            </div>
        </div>

        <!-- Scrollable Photo Chooser Thumbnail Strip -->
        <div id="photoChooser" class="photo-chooser"></div>
    </div>
</div>

<!-- Floating Custom Audio Player -->
<div id="audioPlayerWidget" class="audio-player minimized">
    <!-- Pulse Trigger (Collapsed State) -->
    <div class="player-trigger" id="playerTrigger">
        <div class="pulse-ring"></div>
        <svg class="music-icon" viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
        <div class="visualizer trigger-visualizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </div>

    <!-- Player Controls (Expanded State) -->
    <div class="player-expanded-content">
        <button id="playPauseBtn" class="control-btn play">
            <!-- Play SVG icon -->
            <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <!-- Pause SVG icon -->
            <svg class="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="track-info">
            <div class="track-name">Our Song</div>
            <div class="track-artist-container">
                <div class="track-artist">Ely Lights by The Pink Dream &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Ely Lights by The Pink Dream</div>
            </div>
        </div>

        <div class="scrubber-container">
            <span class="time-current" id="timeCurrent">0:00</span>
            <div class="progress-bar-container" id="progressBarContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <span class="time-duration" id="timeDuration">0:00</span>
        </div>



        <div class="visualizer" id="audioVisualizer">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <button id="minimizeBtn" class="control-btn minimize" title="Minimize player">
            <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
    </div>
</div>
</body>
</html>
